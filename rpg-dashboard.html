<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Adventure of Meh — HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  --bg:       #0a0c10;
  --bg2:      #111520;
  --panel:    #141824;
  --border:   #1e2535;
  --border2:  #2a3550;
  --glow-r:   #ff4060;
  --glow-g:   #40ff80;
  --glow-b:   #40c0ff;
  --glow-y:   #ffe040;
  --glow-p:   #c040ff;
  --glow-o:   #ff8040;
  --text:     #d0e0ff;
  --muted:    #4a5a7a;
  --pixel:    'Press Start 2P', monospace;
  --mono:     'Share Tech Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-columns: 260px 1fr 240px;
  grid-template-rows: 56px 1fr 1fr;
  grid-template-areas:
    "topbar  topbar  topbar"
    "stats   quests  energy"
    "stats   daily   energy";
  gap: 10px;
  padding: 10px;
  position: relative;
}

/* Scanline overlay */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events:none;
  z-index:999;
}

/* ═══════════════════════════════════════════
   PIXEL BORDER HELPER
═══════════════════════════════════════════ */
.pbox {
  background: var(--panel);
  border: 2px solid var(--border2);
  position: relative;
  overflow: hidden;
}
.pbox::before {
  content:'';
  position:absolute;
  inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
  pointer-events:none;
}

/* corner pixel accents */
.pbox .corner { position:absolute; width:6px; height:6px; }
.pbox .corner.tl { top:0; left:0; border-top:2px solid; border-left:2px solid; }
.pbox .corner.tr { top:0; right:0; border-top:2px solid; border-right:2px solid; }
.pbox .corner.bl { bottom:0; left:0; border-bottom:2px solid; border-left:2px solid; }
.pbox .corner.br { bottom:0; right:0; border-bottom:2px solid; border-right:2px solid; }

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
#topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 2px solid var(--border2);
  background: var(--panel);
  border: 2px solid var(--border2);
}

.logo {
  font-family: var(--pixel);
  font-size: 0.55rem;
  color: var(--glow-r);
  text-shadow: 0 0 8px var(--glow-r), 0 0 20px rgba(255,64,96,0.4);
  letter-spacing: 2px;
  animation: flicker 4s infinite;
}

@keyframes flicker {
  0%,95%,100% { opacity:1; }
  96% { opacity:0.7; }
  97% { opacity:1; }
  98% { opacity:0.8; }
}

.topbar-center {
  display: flex;
  align-items: center;
  gap: 20px;
}

.xp-total {
  font-family: var(--pixel);
  font-size: 0.5rem;
  color: var(--glow-y);
  text-shadow: 0 0 6px var(--glow-y);
}

.xp-bar-wrap {
  width: 140px;
  height: 10px;
  background: rgba(255,224,64,0.1);
  border: 1px solid rgba(255,224,64,0.3);
  position: relative;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  background: var(--glow-y);
  box-shadow: 0 0 8px var(--glow-y);
  transition: width 1s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.xp-bar-fill::after {
  content:'';
  position:absolute;
  top:0; right:0;
  width:3px; height:100%;
  background: #fff;
  opacity:0.8;
}

#clock-display {
  font-family: var(--pixel);
  font-size: 0.6rem;
  color: var(--glow-b);
  text-shadow: 0 0 8px var(--glow-b);
}

#date-display {
  font-size: 0.65rem;
  color: var(--muted);
}

/* ═══════════════════════════════════════════
   SECTION TITLE
═══════════════════════════════════════════ */
.sec-title {
  font-family: var(--pixel);
  font-size: 0.42rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title .icon { font-size: 0.8rem; }

/* ═══════════════════════════════════════════
   LEFT: STATS PANEL
═══════════════════════════════════════════ */
#stats-panel {
  grid-area: stats;
  display: flex;
  flex-direction: column;
  border-radius: 4px;
  animation: slideIn 0.4s ease both;
}

@keyframes slideIn {
  from { opacity:0; transform:translateX(-12px); }
  to   { opacity:1; transform:translateX(0); }
}

.sec-title.stats-title { color: var(--glow-g); }

.stats-scroll {
  flex:1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.stats-scroll::-webkit-scrollbar { width:3px; }
.stats-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

/* Category group */
.stat-category {
  margin-bottom: 4px;
}

.cat-header {
  font-family: var(--pixel);
  font-size: 0.38rem;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cat-header::after {
  content:'';
  flex:1;
  height:1px;
  background: var(--border);
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 2px;
  background: rgba(255,255,255,0.02);
  border-left: 2px solid transparent;
  transition: all 0.2s;
  cursor: pointer;
  animation: rowIn 0.3s ease both;
}
.stat-row:hover { background: rgba(255,255,255,0.05); }

@keyframes rowIn {
  from { opacity:0; transform:translateX(-6px); }
  to   { opacity:1; transform:translateX(0); }
}

.stat-name {
  font-size: 0.72rem;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stat-xp {
  font-family: var(--pixel);
  font-size: 0.38rem;
  min-width: 28px;
  text-align: right;
}

.stat-btn-group {
  display: flex;
  gap: 3px;
  opacity: 0;
  transition: opacity 0.15s;
}
.stat-row:hover .stat-btn-group { opacity: 1; }

.stat-btn {
  width: 18px; height: 18px;
  border: 1px solid;
  border-radius: 2px;
  font-family: var(--pixel);
  font-size: 0.5rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
  background: transparent;
}
.stat-btn:active { transform: scale(0.9); }
.stat-btn.plus  { border-color: var(--glow-g); color: var(--glow-g); }
.stat-btn.minus { border-color: var(--glow-r); color: var(--glow-r); }
.stat-btn.plus:hover  { background: rgba(64,255,128,0.15); }
.stat-btn.minus:hover { background: rgba(255,64,96,0.15); }

/* Category color theming */
.cat-physical .stat-row  { border-left-color: var(--glow-r); }
.cat-physical .stat-xp   { color: var(--glow-r); }
.cat-physical .cat-header{ color: var(--glow-r); }
.cat-psyche .stat-row    { border-left-color: var(--glow-p); }
.cat-psyche .stat-xp     { color: var(--glow-p); }
.cat-psyche .cat-header  { color: var(--glow-p); }
.cat-intel .stat-row     { border-left-color: var(--glow-b); }
.cat-intel .stat-xp      { color: var(--glow-b); }
.cat-intel .cat-header   { color: var(--glow-b); }
.cat-spiritual .stat-row { border-left-color: var(--glow-g); }
.cat-spiritual .stat-xp  { color: var(--glow-g); }
.cat-spiritual .cat-header{color: var(--glow-g); }
.cat-core .stat-row      { border-left-color: var(--glow-y); }
.cat-core .stat-xp       { color: var(--glow-y); }
.cat-core .cat-header    { color: var(--glow-y); }

/* area totals */
.area-total-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  padding: 10px 12px;
  border-top: 1px solid var(--border);
}

.area-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 2px;
}
.area-chip .a-label { font-family: var(--pixel); font-size: 0.28rem; color: var(--muted); }
.area-chip .a-val   { font-family: var(--pixel); font-size: 0.5rem; }

/* ═══════════════════════════════════════════
   CENTER TOP: QUEST BOARD
═══════════════════════════════════════════ */
#quests-panel {
  grid-area: quests;
  display: flex;
  flex-direction: column;
  border-radius: 4px;
  animation: fadeUp 0.4s 0.1s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.sec-title.quests-title { color: var(--glow-y); }

.quest-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
}
.qtab {
  font-family: var(--pixel);
  font-size: 0.36rem;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.qtab.active { color: var(--glow-y); border-bottom-color: var(--glow-y); }

.quest-list {
  flex:1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.quest-list::-webkit-scrollbar { width:3px; }
.quest-list::-webkit-scrollbar-thumb { background: var(--border2); }

.quest-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  animation: rowIn 0.25s ease both;
}
.quest-item:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }
.quest-item.done { opacity: 0.35; }
.quest-item.done .quest-name { text-decoration: line-through; }

.quest-check {
  width: 14px; height: 14px;
  border: 2px solid var(--glow-y);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  position: relative;
}
.quest-item.done .quest-check {
  background: var(--glow-y);
}
.quest-check::after {
  content: '✓';
  font-size: 0.5rem;
  color: #000;
  opacity: 0;
  transition: opacity 0.2s;
}
.quest-item.done .quest-check::after { opacity: 1; }

.quest-name { flex:1; font-size: 0.78rem; }
.quest-project {
  font-size: 0.6rem;
  color: var(--muted);
  max-width: 90px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.quest-xp {
  font-family: var(--pixel);
  font-size: 0.38rem;
  color: var(--glow-y);
  background: rgba(255,224,64,0.1);
  border: 1px solid rgba(255,224,64,0.2);
  padding: 2px 5px;
  white-space: nowrap;
}

/* Add quest input */
.quest-add {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
}
.quest-add input {
  flex:1;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 6px 10px;
  outline: none;
  transition: border-color 0.2s;
}
.quest-add input:focus { border-color: var(--glow-y); }
.quest-add input::placeholder { color: var(--muted); }
.quest-add button {
  font-family: var(--pixel);
  font-size: 0.35rem;
  background: rgba(255,224,64,0.1);
  border: 1px solid var(--glow-y);
  color: var(--glow-y);
  padding: 6px 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.quest-add button:hover { background: rgba(255,224,64,0.2); }
.quest-add button:active { transform: scale(0.96); }

/* ═══════════════════════════════════════════
   CENTER BOTTOM: DAILY LOG
═══════════════════════════════════════════ */
#daily-panel {
  grid-area: daily;
  display: flex;
  flex-direction: column;
  border-radius: 4px;
  animation: fadeUp 0.4s 0.2s ease both;
}

.sec-title.daily-title { color: var(--glow-o); }

.daily-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 10px 12px;
  flex:1;
}

.daily-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color 0.2s;
  cursor: pointer;
}
.daily-card:hover { border-color: var(--border2); }

.daily-card-title {
  font-family: var(--pixel);
  font-size: 0.35rem;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.daily-card-val {
  font-family: var(--pixel);
  font-size: 0.9rem;
  line-height: 1;
}

.daily-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
}
.daily-bar {
  height: 100%;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.daily-bar::after {
  content:'';
  position:absolute; top:0; right:0;
  width:2px; height:100%;
  background:#fff; opacity:0.7;
}

.daily-btns {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}
.daily-btn {
  flex:1;
  font-family: var(--pixel);
  font-size: 0.4rem;
  border-radius: 1px;
  border: 1px solid;
  cursor: pointer;
  padding: 4px 0;
  background: transparent;
  transition: all 0.1s;
}
.daily-btn:active { transform: scale(0.94); }
.daily-btn.up   { border-color: var(--glow-g); color: var(--glow-g); }
.daily-btn.down { border-color: var(--glow-r); color: var(--glow-r); }
.daily-btn.up:hover   { background: rgba(64,255,128,0.1); }
.daily-btn.down:hover { background: rgba(255,64,96,0.1); }

/* ═══════════════════════════════════════════
   RIGHT: ENERGY + CLOCK
═══════════════════════════════════════════ */
#right-col {
  grid-area: energy;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#clock-panel {
  border-radius: 4px;
  padding: 14px 14px 12px;
  text-align: center;
  animation: fadeUp 0.4s 0.05s ease both;
  flex-shrink: 0;
}

.big-clock {
  font-family: var(--pixel);
  font-size: 1.3rem;
  color: var(--glow-b);
  text-shadow: 0 0 12px var(--glow-b), 0 0 30px rgba(64,192,255,0.3);
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 6px;
}

.clock-date {
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 1px;
}

.clock-day {
  font-family: var(--pixel);
  font-size: 0.38rem;
  color: var(--glow-g);
  margin-top: 4px;
  text-shadow: 0 0 6px var(--glow-g);
}

#energy-panel {
  border-radius: 4px;
  flex:1;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.4s 0.15s ease both;
}

.sec-title.energy-title { color: var(--glow-r); }

.energy-bars {
  flex:1;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  justify-content: center;
}

.ebar-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.ebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ebar-label {
  font-family: var(--pixel);
  font-size: 0.38rem;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ebar-val {
  font-family: var(--pixel);
  font-size: 0.42rem;
}

.ebar-track {
  height: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}

.ebar-fill {
  height: 100%;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  position: relative;
}

/* pixel segments */
.ebar-fill::before {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(0,0,0,0.3) 8px, rgba(0,0,0,0.3) 10px);
}

.ebar-fill::after {
  content:'';
  position:absolute; top:0; right:0;
  width:3px; height:100%;
  background:#fff; opacity:0.9;
  box-shadow: 0 0 4px #fff;
}

.ebar-controls {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}
.ebar-btn {
  flex:1;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  font-family: var(--pixel);
  font-size: 0.42rem;
  padding: 3px 0;
  transition: all 0.1s;
}
.ebar-btn:active { transform: scale(0.94); }
.ebar-btn.up   { border-color: var(--glow-g); color: var(--glow-g); }
.ebar-btn.dn   { border-color: var(--glow-r); color: var(--glow-r); }
.ebar-btn.up:hover { background: rgba(64,255,128,0.1); }
.ebar-btn.dn:hover { background: rgba(255,64,96,0.1); }

/* ═══════════════════════════════════════════
   TOAST NOTIFICATION
═══════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--panel);
  border: 2px solid var(--glow-y);
  color: var(--glow-y);
  font-family: var(--pixel);
  font-size: 0.4rem;
  padding: 10px 20px;
  letter-spacing: 2px;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  text-shadow: 0 0 6px var(--glow-y);
  box-shadow: 0 0 20px rgba(255,224,64,0.3);
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════
   XP POPUP
═══════════════════════════════════════════ */
.xp-popup {
  position: fixed;
  font-family: var(--pixel);
  font-size: 0.55rem;
  color: var(--glow-y);
  text-shadow: 0 0 8px var(--glow-y);
  pointer-events: none;
  z-index: 1001;
  animation: xpFloat 1.2s ease forwards;
}
@keyframes xpFloat {
  0%   { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-50px) scale(1.4); }
}

/* Notion API badge */
.notion-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.58rem;
  color: var(--muted);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.notion-badge:hover { border-color: var(--border2); color: var(--text); }
.notion-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--glow-g);
  box-shadow: 0 0 4px var(--glow-g);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

/* Notion sync status indicator */
.sync-msg {
  position: fixed;
  top: 70px;
  right: 16px;
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--pixel);
  font-size: 0.36rem;
  padding: 6px 12px;
  z-index: 900;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.sync-msg.show { opacity: 1; }

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 900px) {
  body {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 56px auto auto auto;
    grid-template-areas:
      "topbar  topbar"
      "energy  stats"
      "quests  quests"
      "daily   daily";
    overflow-y: auto;
    height: auto;
    min-height: 100vh;
  }
  #right-col { grid-area: energy; }
}
</style>

}

function getTotalXP() {
  return Object.values(state.stats).flat().reduce((s,st)=>s+st.xp, 0);

function renderStats() {

function adjStat(cat, idx, delta, e) {
  e.stopPropagation();
  state.stats[cat][idx].xp += delta;
  save(); renderStats();
  if (delta > 0) showXpPopup(e.clientX, e.clientY, `+1 ${cat.substring(0,3).toUpperCase()}`);

// ENERGY

  inp.value = '';

// NOTION DIRECT API SYNC

//   Quest Tasks:  1eaa4e88-16f7-811c-85f1-000ba2eefd5d
//   Daily Energy: 1eaa4e88-16f7-8132-90a1-000b27f565d6

// We use a simple public proxy — or you can run your own.
// Multiple CORS proxies — tries each one in order until one works
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,

async function notionQuery(dbId, body = {}) {
  const notionUrl = `https://api.notion.com/v1/databases/${dbId}/query`;
  const fetchOpts = {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${notionToken}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ page_size: 100, ...body }),
  };
  let lastErr;
  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(notionUrl), fetchOpts);
      if (!res.ok) { const txt = await res.text(); throw new Error(`${res.status}: ${txt}`); }
      return await res.json();
    } catch(e) { console.warn('Proxy failed, trying next...', e.message); lastErr = e; }
  }
  throw new Error('All proxies failed: ' + lastErr?.message);
}

async function fetchNotionQuests() {
  try {
    showSync('SYNCING QUESTS...', 'var(--glow-y)');
    const data = await notionQuery(NOTION_QUEST_DB);
    if (!data.results) throw new Error('No results');
    state.quests = data.results.map(page => {
      const props = page.properties;
      const name   = props.Name?.title?.[0]?.plain_text || 'Unnamed';
      const xp     = props.XPs?.number || 1;
      const done   = props['']?.checkbox || false;
      const status = props.Status?.status?.name || 'Not started';
      const tab    = 'pursuits'; // you can map by project later
      return { name, xp, done, project: '', tab, notionId: page.id };
    });
    save(); renderQuests();
    showSync(`✓ ${state.quests.length} QUESTS SYNCED`, 'var(--glow-g)');
  } catch(e) {
    console.error('Quest sync:', e);
    showSync('QUEST SYNC FAILED — check token', 'var(--glow-r)');
  }
}

async function fetchNotionEnergy() {
  try {
    showSync('SYNCING ENERGY...', 'var(--glow-b)');
    const data = await notionQuery(NOTION_ENERGY_DB);
    if (!data.results) throw new Error('No results');
    const colorMap = { HP:'var(--glow-r)', Mood:'var(--glow-p)', Focus:'var(--glow-b)', Motivation:'var(--glow-y)' };
    const rows = data.results.map(page => {
      const props = page.properties;
      const name    = props.Name?.title?.[0]?.plain_text || 'STAT';
      const current = props.Current?.number ?? 0;
      const max     = props.Max?.number ?? 10;
      return { name: name.toUpperCase(), val: current, max, color: colorMap[name] || 'var(--glow-b)' };
    }).filter(r => r.max > 0);
    if (rows.length > 0) { state.energy = rows; save(); renderEnergy(); }
    showSync('✓ ENERGY SYNCED', 'var(--glow-g)');
  } catch(e) {
    console.error('Energy sync:', e);
    showSync('ENERGY SYNC FAILED — check token', 'var(--glow-r)');
  }
}

async function fetchNotionStats() {
  try {
    showSync('SYNCING STATS...', 'var(--glow-g)');
    const data = await notionQuery(NOTION_STATS_DB);
    if (!data.results) throw new Error('No results');
    const grouped = { Physical:[], Psyche:[], Intel:[], Spiritual:[], Core:[] };
    data.results.forEach(page => {
      const props = page.properties;
      const name   = props.Name?.title?.[0]?.plain_text || props['Main Stats']?.title?.[0]?.plain_text || 'Stat';
      const cat    = props.Categories?.select?.name || props.Category?.select?.name || '';
      const xp     = props['Total XPs']?.formula?.number ?? props['Manual XPs']?.number ?? 0;
      if (grouped[cat]) grouped[cat].push({ name, xp: Math.round(xp) });
    });
    let updated = false;
    Object.keys(grouped).forEach(cat => { if (grouped[cat].length > 0) { state.stats[cat] = grouped[cat]; updated = true; } });
    if (updated) { save(); renderStats(); }
    showSync('✓ STATS SYNCED', 'var(--glow-g)');
  } catch(e) {
    console.error('Stats sync:', e);
    showSync('STATS SYNC FAILED — check token', 'var(--glow-r)');
  }
}

async function syncAllNotion() {
  if (!notionToken) { openTokenModal(); return; }
  document.getElementById('notion-label').textContent = 'SYNCING...';
  document.querySelector('.notion-dot').style.background = 'var(--glow-y)';
  try {
    await Promise.all([fetchNotionEnergy(), fetchNotionQuests(), fetchNotionStats()]);
    document.getElementById('notion-label').textContent = '✓ NOTION LIVE';
    document.querySelector('.notion-dot').style.background = 'var(--glow-g)';
  } catch(e) {
    document.getElementById('notion-label').textContent = 'SYNC FAILED';
    document.querySelector('.notion-dot').style.background = 'var(--glow-r)';
  }
}

document.getElementById('notion-status').onclick = syncAllNotion;

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
renderStats();
renderEnergy();
renderQuests();
renderDaily();

// Auto-sync if token already saved
if (notionToken) {
  setTimeout(syncAllNotion, 800);
  setInterval(syncAllNotion, 5 * 60 * 1000);
} else {
  // Show hint
  document.getElementById('notion-label').textContent = 'Connect Notion →';
}
</script>
</body>
